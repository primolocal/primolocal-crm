name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true
          cd .next/standalone
          tar -czf ../../deploy.tar.gz .

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} -t rsa ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} -t ed25519 ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload tarball
        run: |
          scp -P ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.tar.gz ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:~/

      - name: Extract and restart
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }} '
            export PATH=/opt/alt/alt-nodejs24/root/usr/bin:$PATH
            cd ~/primolocal-app
            pkill -9 -f node || true
            sleep 2
            rm -rf .next node_modules public server.js package.json package-lock.json static
            tar -xzf ~/deploy.tar.gz
            export NODE_ENV=production
            export PORT=3000
            export SMTP_HOST=smtp.gmail.com
            export SMTP_PORT=587
            export SMTP_USER=tommy@primolocal.org
            export SMTP_PASS="${{ secrets.HOSTINGER_EMAIL_PASS }}"
            export NOTIFY_EMAIL=tommy@primolocal.org
            setsid node server.js > server.log 2>&1 < /dev/null &
            sleep 5
            curl -s -o /dev/null -w "HTTP: %{http_code}\n" http://localhost:3000/
          '
