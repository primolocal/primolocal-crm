name: Deploy to Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true
          cd .next/standalone
          tar -czf ../../deploy.tar.gz .

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload tarball
        run: |
          sshpass -p "${{ secrets.HOSTINGER_PASSWORD }}" scp -o StrictHostKeyChecking=no -P ${{ secrets.HOSTINGER_PORT }} deploy.tar.gz ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:~/

      - name: Extract and restart
        run: |
          sshpass -p "${{ secrets.HOSTINGER_PASSWORD }}" ssh -o StrictHostKeyChecking=no -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }} '
            export PATH=/opt/alt/alt-nodejs24/root/usr/bin:$PATH
            cd ~/primolocal-app
            pkill -9 -f node || true
            sleep 2
            rm -rf .next node_modules public server.js package.json package-lock.json static
            tar -xzf ~/deploy.tar.gz
            export NODE_ENV=production
            export PORT=3000
            export SMTP_HOST=smtp.gmail.com
            export SMTP_PORT=587
            export SMTP_USER=tommy@primolocal.org
            export SMTP_PASS="qjkw aqgq bzkq ojyz"
            export NOTIFY_EMAIL=tommy@primolocal.org
            setsid node server.js > server.log 2>&1 < /dev/null &
            sleep 5
            curl -s -o /dev/null -w "HTTP: %{http_code}\n" http://localhost:3000/
          '
